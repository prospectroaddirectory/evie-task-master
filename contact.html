<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a visit — Evie Task Master</title>
<meta name="description" content="Request a holiday visit from Evie Task Master — Prospect Road and nearby.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!--
  SETUP NEEDED before this goes live:
  1. Go to formspree.io and sign up free with the email you want enquiries
     sent to (this can be your own email — it stays private, it's never
     shown anywhere in this page's code).
  2. Create a new form, copy the endpoint it gives you
     (looks like https://formspree.io/f/abcd1234).
  3. Paste that into the form's "action" attribute below, replacing
     YOUR_FORM_ID.
  Until that's done, the form will not actually deliver anywhere.
-->
</head>
<body>

<header>
  <div class="wrap">
    <a class="brand" href="index.html">Evie <span>Task Master</span></a>
  </div>
</header>

<section>
  <div class="wrap">
    <a class="back-link" href="index.html">← Back to services &amp; pricing</a>
    <span class="eyebrow">Request a visit</span>
    <h1 style="font-size:1.9rem;">Tell us when you're away</h1>
    <p style="color:var(--text-soft); max-width:46ch; margin-top:6px;">This goes straight to a parent — fill in as much as you can and we'll come back to you to confirm.</p>

    <div class="contact-card" style="margin-top:28px;">
      <form id="requestForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <input type="hidden" name="_subject" value="Evie Task Master – New visit request">

        <div class="field">
          <label for="name">Your name</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="field">
          <label for="email">Your email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="field">
          <label for="dates">Dates you'll be away</label>
          <input type="text" id="dates" name="dates" placeholder="e.g. 4–18 August">
        </div>

        <div class="field">
          <label for="address">Address</label>
          <input type="text" id="address" name="address" required>
        </div>

        <div class="field">
          <label>What do you need covered?</label>
          <div class="check-grid">
            <label><input type="checkbox" name="services" value="Pet feeding"> Pet feeding</label>
            <label><input type="checkbox" name="services" value="Plants & garden"> Plants &amp; garden</label>
            <label><input type="checkbox" name="services" value="Bins out & in"> Bins out &amp; in</label>
            <label><input type="checkbox" name="services" value="Parcels"> Parcels</label>
            <label><input type="checkbox" name="services" value="Security check"> Security check</label>
            <label><input type="checkbox" name="services" value="Curtains & lights"> Curtains &amp; lights</label>
          </div>
        </div>

        <div class="field">
          <label for="notes">Anything else we should know?</label>
          <textarea id="notes" name="notes" placeholder="Key location, pet feeding times, anything that needs special care…"></textarea>
        </div>

        <button type="submit" class="btn" id="submitBtn">Send request →</button>
      </form>
      <p class="form-msg" id="formMsg" role="status"></p>
    </div>
  </div>
</section>

<footer>
  <span class="brand">Evie Task Master</span>
  Serving Prospect Road and nearby streets · Summer holidays only
</footer>

<script>
  const form = document.getElementById('requestForm');
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Sending…';
    msg.textContent = '';
    msg.className = 'form-msg';

    try {
      const response = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        form.reset();
        form.hidden = true;
        msg.textContent = "Thanks! That's been sent through — we'll reply by email to confirm.";
        msg.className = 'form-msg success';
      } else {
        throw new Error('Form service returned an error');
      }
    } catch (err) {
      msg.textContent = "Sorry, that didn't send. Please try again, or check the form is set up correctly.";
      msg.className = 'form-msg error';
      btn.disabled = false;
      btn.textContent = 'Send request →';
    }
  });
</script>

</body>
</html>
